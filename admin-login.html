<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Đăng Nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#04051A;
  --bg2:#080C2E;
  --card:#0D1240;
  --violet:#7B5EA7;
  --indigo:#4F6BFF;
  --teal:#2DD4BF;
  --glow:#A78BFA;
  --txt:#E8E8F0;
  --muted:#9898B8;
  --gold:#C9A84C;
  --border:rgba(123,94,167,.25);
  --border-h:rgba(167,139,250,.55);
  --grad:linear-gradient(135deg,#7B5EA7,#4F6BFF);
  --grad-glow:0 0 24px rgba(167,139,250,.35);
}

body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Be Vietnam Pro',sans-serif;
  color:var(--txt);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* starfield */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,rgba(167,139,250,.6) 0,transparent 0),
    radial-gradient(1px 1px at 30% 55%,rgba(255,255,255,.3) 0,transparent 0),
    radial-gradient(1px 1px at 50% 25%,rgba(167,139,250,.4) 0,transparent 0),
    radial-gradient(1px 1px at 70% 75%,rgba(255,255,255,.25) 0,transparent 0),
    radial-gradient(1px 1px at 85% 40%,rgba(45,212,191,.4) 0,transparent 0),
    radial-gradient(1px 1px at 20% 85%,rgba(255,255,255,.2) 0,transparent 0),
    radial-gradient(1px 1px at 60% 90%,rgba(167,139,250,.3) 0,transparent 0),
    radial-gradient(1px 1px at 90% 10%,rgba(255,255,255,.35) 0,transparent 0);
  pointer-events:none;z-index:0;
}

/* orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(123,94,167,.18),transparent 70%);top:-10%;left:-10%;}
.orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(79,107,255,.14),transparent 70%);bottom:-5%;right:-5%;}

.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;padding:1rem;
}

.brand{text-align:center;margin-bottom:2rem;}
.brand-symbol{
  font-size:2.2rem;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-bottom:.5rem;
}
.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;font-weight:600;letter-spacing:.08em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:.75rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:.25rem;}

.glass-card{
  background:rgba(13,18,64,.65);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2.4rem 2rem;
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
}

.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:600;
  text-align:center;margin-bottom:1.8rem;
  color:var(--txt);
}
.card-title span{
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.f-group{margin-bottom:1.2rem;}
.f-label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem;}
.f-input{
  width:100%;
  background:rgba(4,5,26,.7);
  border:1px solid var(--border);
  border-radius:10px;
  padding:.75rem 1rem;
  color:var(--txt);
  font-family:'Be Vietnam Pro',sans-serif;
  font-size:.9rem;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.f-input::placeholder{color:rgba(152,152,184,.4);}
.f-input:focus{
  border-color:var(--glow);
  box-shadow:0 0 0 3px rgba(167,139,250,.15),0 0 12px rgba(167,139,250,.2);
}
.f-input-icon{position:relative;}
.f-input-icon .f-input{padding-left:2.6rem;}
.f-input-icon .icon{
  position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1rem;pointer-events:none;
}

.f-options{display:flex;justify-content:flex-end;margin-bottom:1.5rem;}
.f-link{font-size:.8rem;color:var(--glow);text-decoration:none;opacity:.8;}
.f-link:hover{opacity:1;}

.btn-primary{
  width:100%;
  background:var(--grad);
  border:none;border-radius:10px;
  padding:.85rem 1.5rem;
  color:#fff;font-family:'Be Vietnam Pro',sans-serif;
  font-size:.9rem;font-weight:600;letter-spacing:.05em;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(123,94,167,.4);
  transition:opacity .2s,box-shadow .2s,transform .15s;
  position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-primary:hover{opacity:.92;box-shadow:0 6px 28px rgba(123,94,167,.6);transform:translateY(-1px);}
.btn-primary:hover::after{opacity:1;}
.btn-primary:active{transform:translateY(0);}

.divider{
  display:flex;align-items:center;gap:.75rem;
  margin:1.4rem 0;color:var(--muted);font-size:.75rem;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}

.security-note{
  display:flex;align-items:center;gap:.5rem;
  text-align:center;justify-content:center;
  font-size:.72rem;color:var(--muted);margin-top:1.4rem;
}
.security-note .lock{color:var(--teal);font-size:.85rem;}

.login-footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:var(--muted);}
.login-footer a{color:var(--glow);text-decoration:none;}

/* error shake */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .35s ease;}
.f-error{font-size:.72rem;color:#f87171;margin-top:.3rem;display:none;}
.f-error.show{display:block;}

    /* ── RESPONSIVE IMPROVEMENTS ── */
    @media (max-width: 480px) {
      body { padding: 1rem; }
      .f-input { font-size: 16px; min-height: 44px; }
      .btn-primary { min-height: 48px; }
    }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="brand">
    <span class="brand-symbol">✦</span>
    <div class="brand-name">SAMMY TRƯƠNG</div>
    <div class="brand-sub">Admin Portal</div>
  </div>

  <div class="glass-card">
    <h1 class="card-title">Đăng Nhập <span>Quản Trị</span></h1>

    <form id="loginForm" novalidate>
      <div class="f-group">
        <label class="f-label" for="username">Tên đăng nhập</label>
        <div class="f-input-icon">
          <span class="icon">👤</span>
          <input class="f-input" type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
        </div>
        <p class="f-error" id="err-user">Vui lòng nhập tên đăng nhập</p>
      </div>

      <div class="f-group">
        <label class="f-label" for="password">Mật khẩu</label>
        <div class="f-input-icon">
          <span class="icon">🔒</span>
          <input class="f-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <p class="f-error" id="err-pass">Vui lòng nhập mật khẩu</p>
      </div>

      <div class="f-options">
        <a href="#" class="f-link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span id="btnText">✦ Đăng Nhập</span>
      </button>

      <p class="f-error" id="err-auth" style="text-align:center;margin-top:.6rem;font-size:.8rem;"></p>
    </form>

    <div class="divider">bảo mật</div>

    <div class="security-note">
      <span class="lock">🔐</span>
      Kết nối được mã hóa. Chỉ dành cho quản trị viên.
    </div>
  </div>

  <div class="login-footer">
    <a href="index.html">← Về trang chủ</a>
  </div>
</div>

<script>
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'sammy2024!';

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  let ok = true;

  document.querySelectorAll('.f-error').forEach(el => el.classList.remove('show'));

  if(!u){ document.getElementById('err-user').classList.add('show'); ok=false; }
  if(!p){ document.getElementById('err-pass').classList.add('show'); ok=false; }
  if(!ok) return;

  const btn = document.getElementById('loginBtn');
  const txt = document.getElementById('btnText');
  btn.disabled = true;
  txt.textContent = 'Đang xác thực…';

  setTimeout(()=>{
    if(u === ADMIN_USER && p === ADMIN_PASS){
      sessionStorage.setItem('admin_auth','1');
      txt.textContent = '✓ Thành công!';
      setTimeout(()=> window.location.href = 'admin.html', 600);
    } else {
      btn.disabled = false;
      txt.textContent = '✦ Đăng Nhập';
      const errEl = document.getElementById('err-auth');
      errEl.textContent = 'Tên đăng nhập hoặc mật khẩu không đúng.';
      errEl.classList.add('show');
      document.querySelector('.glass-card').classList.add('shake');
      setTimeout(()=> document.querySelector('.glass-card').classList.remove('shake'), 400);
    }
  }, 800);
});
</script>
</body>
</html>
